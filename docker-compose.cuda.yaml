services:

  sentiment-analyzer-ml:
    build:
      context: ./services/ml
      dockerfile: Dockerfile.GPU
    env_file:
      - .env
    ports:
      - "8010:8000"
    volumes:
      - ml_model_cache:/root/.cache
    environment:
      CUDA_VISIBLE_DEVICES: "0"
    gpus: all
    command: >
      uvicorn ml.main:app
      --host 0.0.0.0
      --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5


  sentiment-analyzer-backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - llm_cache:/root/.cache
      - logs:/app/logs
    depends_on:
      sentiment-analyzer-ml:
        condition: service_healthy
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
    restart: unless-stopped


  sentiment-analyzer-ui:
    build:
      context: ./services/ui
      dockerfile: Dockerfile
    ports:
      - "${UI_PORT}:3000"
    environment:
      FASTAPI_BASE_URL: http://sentiment-analyzer-backend:8000
    depends_on:
      - sentiment-analyzer-backend
    restart: unless-stopped


volumes:
  logs:
  llm_cache:
  ml_model_cache: