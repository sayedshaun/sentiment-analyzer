services:
  sentiment-analyzer-bert:
    container_name: sentiment-analyzer-bert
    build:
      context: ./services/bert
      dockerfile: Dockerfile.GPU
    ports:
      - "8010:8000"
    restart: unless-stopped
    environment:
      CUDA_VISIBLE_DEVICES: 0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  sentiment-analyzer-tts:
    container_name: sentiment-analyzer-tts
    build:
      context: ./services/stt
      dockerfile: Dockerfile.GPU
    ports:
      - "8013:8000"
    restart: unless-stopped
    environment:
      CUDA_VISIBLE_DEVICES: 0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  sentiment-analyzer-backend:
    container_name: sentiment-analyzer-backend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8012:8000"
    volumes:
      - llm_cache:/root/.cache
    depends_on:
      - sentiment-analyzer-bert
      - sentiment-analyzer-tts
    restart: unless-stopped

volumes:
  ollama_models:
  llm_cache: